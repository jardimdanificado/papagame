<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wagnostic Web Runner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Wagnostic</h1>
            <div class="loader-group">
                <div id="controls">
                    <input type="file" id="wasmInput" accept=".wasm" class="file-input" />
                </div>
                <label for="wasmInput" class="file-label">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    <span>Load Game (WASM)</span>
                </label>
            </div>
        </header>
        
        <main class="game-container">
            <div id="gameUI" class="game-ui">
                <div id="canvasWrapper" class="canvas-wrapper empty">
                    <div class="empty-state">
                        <p>No game loaded</p>
                        <small>Select a .wasm compiled for Wagnostic to begin.</small>
                    </div>
                    <canvas id="gameCanvas" width="320" height="240"></canvas>
                </div>
                
                <div id="virtualGamepad" class="virtual-gamepad">
                    <div class="dpad">
                        <button class="btn-dpad up" data-btn="up">▲</button>
                        <button class="btn-dpad left" data-btn="left">◀</button>
                        <button class="btn-dpad right" data-btn="right">▶</button>
                        <button class="btn-dpad down" data-btn="down">▼</button>
                    </div>
                    <div class="center-buttons">
                        <button class="btn-small" data-btn="select">SELECT</button>
                        <button class="btn-small" data-btn="start">START</button>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-action b-btn" data-btn="b">B</button>
                        <button class="btn-action a-btn" data-btn="a">A</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <div class="controls-hint">
                <p><strong>Controls:</strong> Arrows = D-Pad | Z / X = A / B | Enter = Start | Shift = Select</p>
                <p>Ensure the canvas is focused to capture input.</p>
            </div>
        </footer>
    </div>
    <script src="runner.js"></script>
</body>
</html>
