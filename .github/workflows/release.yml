name: Release Manual

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.0.0)"
        required: true
        type: string
      create_tag:
        description: "Create tag vX.Y.Z if it does not exist"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark release as pre-release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build native host (matrix)
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            target: linux
            archive: linux-x64
          - name: Linux x86 32-bit
            os: ubuntu-latest
            target: linux-x86
            archive: linux-x86
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            target: linux-arm64
            archive: linux-arm64
          - name: macOS Intel x64
            os: macos-15-intel
            target: macos-intel
            archive: macos-x64
          - name: macOS ARM64
            os: macos-14
            target: macos-arm64
            archive: macos-arm64
          - name: Windows x64 (MinGW)
            os: windows-latest
            target: windows-mingw
            archive: windows-x64-mingw
          - name: Windows x86 32-bit (MinGW)
            os: windows-latest
            target: windows-mingw32
            archive: windows-x86-mingw
          - name: Windows x64 (MSVC)
            os: windows-latest
            target: windows-msvc
            archive: windows-x64-msvc
          - name: Windows x86 32-bit (MSVC)
            os: windows-latest
            target: windows-msvc32
            archive: windows-x86-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Linux x64 / ARM64 ---
      - name: Deps (Linux x64 / ARM64)
        if: matrix.target == 'linux' || matrix.target == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsdl2-dev libgl1-mesa-dev pkg-config

      # --- Linux x86 32-bit ---
      - name: Deps (Linux x86 32-bit)
        if: matrix.target == 'linux-x86'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            gcc-multilib \
            libsdl2-dev:i386 \
            libglib2.0-dev:i386 \
            libdbus-1-dev:i386 \
            libgl1-mesa-dev:i386 \
            libasound2-dev:i386 \
            pkg-config

      # --- macOS ---
      - name: Deps (macOS)
        if: startsWith(matrix.target, 'macos')
        run: brew install sdl2

      # --- Windows MinGW x64 ---
      - name: Deps (Windows MinGW x64)
        if: matrix.target == 'windows-mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-sdl2

      # --- Windows MinGW x86 ---
      - name: Deps (Windows MinGW x86)
        if: matrix.target == 'windows-mingw32'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: mingw-w64-i686-gcc mingw-w64-i686-sdl2

      # --- Build steps ---
      - name: Build (Linux x64 / ARM64)
        if: matrix.target == 'linux' || matrix.target == 'linux-arm64'
        run: |
          gcc -Ilib/wasm3 -O2 \
            runners/native/host.c lib/wasm3/*.c \
            -o wagnostic \
            $(pkg-config --cflags --libs sdl2) \
            -lGL -lm

      - name: Build (Linux x86)
        if: matrix.target == 'linux-x86'
        run: |
          gcc -m32 -Ilib/wasm3 -O2 \
            runners/native/host.c lib/wasm3/*.c \
            -o wagnostic \
            $(PKG_CONFIG_PATH=/usr/lib/i386-linux-gnu/pkgconfig pkg-config --cflags --libs sdl2) \
            -lGL -lm

      - name: Build (macOS)
        if: startsWith(matrix.target, 'macos')
        run: |
          gcc -Ilib/wasm3 -O2 \
            runners/native/host.c lib/wasm3/*.c \
            -o wagnostic \
            $(sdl2-config --cflags --libs) \
            -framework OpenGL -lm

      - name: Build (Windows MinGW x64)
        if: matrix.target == 'windows-mingw'
        shell: msys2 {0}
        run: |
          gcc -Ilib/wasm3 -O2 \
            runners/native/host.c lib/wasm3/*.c \
            -o wagnostic.exe \
            -lmingw32 -lSDL2main -lSDL2 -lopengl32 -lm

      - name: Build (Windows MinGW x86)
        if: matrix.target == 'windows-mingw32'
        shell: msys2 {0}
        run: |
          gcc -Ilib/wasm3 -O2 \
            runners/native/host.c lib/wasm3/*.c \
            -o wagnostic.exe \
            -lmingw32 -lSDL2main -lSDL2 -lopengl32 -lm

      - name: Build (Windows MSVC x64)
        if: matrix.target == 'windows-msvc'
        shell: powershell
        run: |
          vcpkg install sdl2:x64-windows
          cmake -S . -B build -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build build --config Release

      - name: Build (Windows MSVC x86)
        if: matrix.target == 'windows-msvc32'
        shell: powershell
        run: |
          vcpkg install sdl2:x86-windows
          cmake -S . -B build -A Win32 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x86-windows
          cmake --build build --config Release

      # --- Package steps ---
      - name: Package (Linux / macOS)
        if: startsWith(matrix.target, 'linux') || startsWith(matrix.target, 'macos')
        run: |
          mkdir dist_pkg
          cp wagnostic dist_pkg/
          cp README.md dist_pkg/
          tar -czf "wagnostic-v${{ inputs.version }}-${{ matrix.archive }}.tar.gz" -C dist_pkg .

      - name: Package (Windows MinGW x64)
        if: matrix.target == 'windows-mingw'
        shell: msys2 {0}
        run: |
          mkdir -p dist_pkg
          cp wagnostic.exe dist_pkg/
          cp /mingw64/bin/SDL2.dll dist_pkg/
          cp README.md dist_pkg/
          powershell -NoProfile -Command \
            "Compress-Archive -Path dist_pkg\* -DestinationPath wagnostic-v${{ inputs.version }}-${{ matrix.archive }}.zip -Force"

      - name: Package (Windows MinGW x86)
        if: matrix.target == 'windows-mingw32'
        shell: msys2 {0}
        run: |
          mkdir -p dist_pkg
          cp wagnostic.exe dist_pkg/
          cp /mingw32/bin/SDL2.dll dist_pkg/
          cp README.md dist_pkg/
          powershell -NoProfile -Command \
            "Compress-Archive -Path dist_pkg\* -DestinationPath wagnostic-v${{ inputs.version }}-${{ matrix.archive }}.zip -Force"

      - name: Package (Windows MSVC x64)
        if: matrix.target == 'windows-msvc'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist_pkg
          Copy-Item build/Release/wagnostic.exe dist_pkg/
          $dll = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\SDL2.dll"
          if (Test-Path $dll) { Copy-Item $dll dist_pkg/ }
          Copy-Item README.md dist_pkg/
          Compress-Archive -Path dist_pkg/* `
            -DestinationPath "wagnostic-v${{ inputs.version }}-${{ matrix.archive }}.zip" -Force

      - name: Package (Windows MSVC x86)
        if: matrix.target == 'windows-msvc32'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist_pkg
          Copy-Item build/Release/wagnostic.exe dist_pkg/
          $dll = "$env:VCPKG_INSTALLATION_ROOT\installed\x86-windows\bin\SDL2.dll"
          if (Test-Path $dll) { Copy-Item $dll dist_pkg/ }
          Copy-Item README.md dist_pkg/
          Compress-Archive -Path dist_pkg/* `
            -DestinationPath "wagnostic-v${{ inputs.version }}-${{ matrix.archive }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wagnostic-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 2: Build WASM Examples (runs once on Linux)
  # ---------------------------------------------------------------------------
  build-examples:
    name: Build WASM Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang xxd ffmpeg

      - name: Build examples
        run: |
          cd examples
          make clean
          make
          make audio

      - name: Package examples
        run: |
          mkdir -p examples_pkg/examples
          cp examples/*.wasm examples_pkg/examples/
          cd examples_pkg
          zip -r "../wagnostic-v${{ inputs.version }}-examples.zip" examples/

      - name: Upload examples artifact
        uses: actions/upload-artifact@v4
        with:
          name: wagnostic-examples
          path: wagnostic-v${{ inputs.version }}-examples.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 3: Publish Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build, build-examples]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag if requested
        if: inputs.create_tag
        run: |
          tag="v${{ inputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: "Wagnostic v${{ inputs.version }}"
          prerelease: ${{ inputs.prerelease }}
          files: artifacts/**/*
